services:
  - type: web
    name: scalpvision-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: AI_SERVICE_URL
        sync: false
