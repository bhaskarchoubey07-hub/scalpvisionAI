version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_WS_URL: ws://localhost:4000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "4000:4000"
    environment:
      API_PORT: 4000
      JWT_SECRET: change-me
      FRONTEND_URL: http://localhost:3000
      AI_SERVICE_URL: http://ai:8000
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/scalpvision
      CLOUD_STORAGE_BUCKET: scalpvision-screenshots
    depends_on:
      - postgres
      - redis
      - ai

  ai:
    build:
      context: ./ai-service
    ports:
      - "8000:8000"
    environment:
      MODEL_DEVICE: cpu

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: scalpvision
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
